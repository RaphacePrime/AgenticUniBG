services:
  # Backend FastAPI + LangChain
  server:
    build:
      context: ./agentic_unibg/server
      dockerfile: Dockerfile
    container_name: agentic-unibg-server
    ports:
      - "8000:8000"
    volumes:
      - ./agentic_unibg/server:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MONGODB_URI=mongodb+srv://agentic_unibg:agentic_unibg2026@mycluster.jgl4w15.mongodb.net/?appName=MyCluster
      - MONGODB_DB_NAME=agentic_unibg
      - ENVIRONMENT=development
    env_file:
      - .env
    networks:
      - agentic-network
    restart: unless-stopped

  # Frontend React
  app:
    build:
      context: ./agentic_unibg/app
      dockerfile: Dockerfile
    container_name: agentic-unibg-app
    ports:
      - "3000:5173"
    volumes:
      - ./agentic_unibg/app/src:/app/src
      - ./agentic_unibg/app/index.html:/app/index.html
      - ./agentic_unibg/app/vite.config.js:/app/vite.config.js
    depends_on:
      - server
    networks:
      - agentic-network
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  agentic-network:
    driver: bridge
