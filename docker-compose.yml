services:
  # Backend FastAPI + LangChain
  server:
    build:
      context: ./agentic_unibg/server
      dockerfile: Dockerfile
    container_name: agentic-unibg-server
    ports:
      - "8000:8000"
    volumes:
      - ./agentic_unibg/server:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - ENVIRONMENT=development
    env_file:
      - .env
    networks:
      - agentic-network
    restart: unless-stopped

  # Frontend React
  app:
    build:
      context: ./agentic_unibg/app
      dockerfile: Dockerfile
    container_name: agentic-unibg-app
    ports:
      - "3000:80"
    depends_on:
      - server
    networks:
      - agentic-network
    restart: unless-stopped

networks:
  agentic-network:
    driver: bridge
